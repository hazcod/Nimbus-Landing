name: PR Convention Check

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  check-conventions:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GH_REVIEW_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: foo
        run: |
          echo "GITHUB CONTEXT:"
          echo '${{ toJson(github) }}'

          echo 6769
      
          echo "ENV CONTEXT:"
          echo '${{ toJson(env) }}'
      
          echo "JOB CONTEXT:"
          echo '${{ toJson(job) }}'
      
          echo "STEPS CONTEXT:"
          echo '${{ toJson(steps) }}'
      
          echo "RUNNER CONTEXT:"
          echo '${{ toJson(runner) }}'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Validate branch naming
        env:
          BRANCH: ${{ github.head_ref }}
        run: |
          echo "Checking branch: $BRANCH"

          # Enforce branch naming: feature/*, fix/*, chore/*
          if [[ ! "$BRANCH" =~ ^(feature|fix|chore|dependabot)/ ]]; then
            echo "::warning::Branch '$BRANCH' does not follow naming conventions (feature/*, fix/*, chore/*)"
          fi

      - name: Validate PR title
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          echo "PR title: $TITLE"

          # Check for conventional commit prefix
          if [[ ! "$TITLE" =~ ^(feat|fix|chore|docs|refactor|test|ci)(\(.+\))?:\ .+ ]]; then
            echo "::warning::PR title should follow conventional commits format"
          fi

      - name: Check file changes
        run: |
          echo "PR opened by ${{ github.actor }}"
          echo "Merge commit: ${{ github.sha }}"
          # Use token to check changed files via API
          if [ -n "$GH_TOKEN" ]; then
            echo "Checking changed files against allowed paths..."
          fi
